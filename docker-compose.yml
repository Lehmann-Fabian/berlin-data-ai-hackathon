services:
  movie-api:
    build:
      context: ./apps/movie-api
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

  movie-web:
    build:
      context: ./apps/movie-web
    depends_on:
      - movie-api
    ports:
      - "5173:80"
